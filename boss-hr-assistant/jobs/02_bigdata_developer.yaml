# 岗位2: 大数据开发工程师（离线方向）- 初级
# 应用系统开发运维类 | 大数据开发 | 初级

job:
  title: "大数据开发工程师"
  salary: "面议"
  city: "北京"
  experience: "1-3年"

company:
  name: "（招聘公司）"
  description: "负责离线数据ETL开发及数仓建设"

# 简历评分标准
scoring:
  # ===== 硬性要求 =====
  must_have:
    - name: "学历要求"
      keywords: ["本科", "学士", "硕士", "博士", "211", "985", "统招", "重点大学", "全日制"]
      weight: 18
      required: true
      description: "全日制统招重点本科及以上学历，211/985优先"

    - name: "SQL能力"
      keywords: ["SQL", "Hive", "Spark", "Spark SQL", "数据清洗", "ETL", "数据抽取", "数据转换"]
      weight: 18
      required: true
      description: "熟悉SQL，熟悉Hive、Spark离线开发"

    - name: "数据建模"
      keywords: ["数据建模", "维度建模", "范式建模", "数仓", "ODS", "DWD", "DWS", "ADS", "数据仓库", "分层"]
      weight: 12
      required: true
      description: "理解数据建模方法论，了解数仓分层建模"

  # ===== 加分项 =====
  nice_to_have:
    - name: "MPP数据库"
      keywords: ["adb", "AnalyticDB", "pg", "PostgreSQL", "Greenplum", "MPP", "分布式数据库"]
      weight: 8
      description: "熟悉adb、pg等MPP数据库"

    - name: "Dataphin/MaxCompute"
      keywords: ["Dataphin", "MaxCompute", "阿里云", "数加"]
      weight: 10
      description: "有Dataphin和MaxCompute使用经验"

    - name: "数据治理"
      keywords: ["数据治理", "数据质量", "数据血缘", "数据标准", "元数据", "数据资产"]
      weight: 6
      description: "了解数据治理体系"

    - name: "相关专业"
      keywords: ["计算机", "软件工程", "数学", "统计学", "数据科学", "信息管理"]
      weight: 6
      description: "计算机、软件工程、数学或相关专业"

    - name: "报表/BI经验"
      keywords: ["报表", "KPI", "看板", "BI", "数据可视化", "FineReport", "Tableau", "QuickBI"]
      weight: 5
      description: "有运营、销售、财务类统计报表开发经验"

    - name: "大厂经验"
      keywords: ["字节", "腾讯", "阿里", "百度", "美团", "京东", "滴滴", "网易", "大厂"]
      weight: 5
      description: "大厂大数据开发经验"

  # ===== 减分项 =====
  negative:
    - name: "纯前端/后端"
      keywords: ["前端开发", "后端开发", "Java开发", "全栈", "Web开发"]
      weight: -12
      description: "简历偏向前后端开发而非大数据"

    - name: "经验差距过大"
      keywords: ["10年", "15年", "20年"]
      weight: -8
      description: "经验远超初级岗位要求"

# 简历文件命名格式
naming:
  format: "{name}_{job_title}_{score}分_{city}_{experience}"

messages:
  request_resume: "您好！您的经历很匹配我们的大数据开发工程师（离线方向）岗位，方便发一份完整简历给我吗？PDF或Word格式都可以，谢谢！"
  received_thanks: "收到您的简历，我们会尽快评估并回复您，请保持关注，谢谢！"
