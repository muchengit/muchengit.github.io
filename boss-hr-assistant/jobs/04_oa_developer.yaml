# 岗位4: 新OA系统开发工程师 - 中级
# 应用系统开发运维类 | 新OA系统开发 | 中级

job:
  title: "OA系统开发工程师"
  salary: "面议"
  city: "北京"
  experience: "5年以上"

company:
  name: "（招聘公司）"
  description: "负责OA系统开发优化及技术方案输出"

# 简历评分标准
scoring:
  # ===== 硬性要求 =====
  must_have:
    - name: "Java开发"
      keywords: ["Java", "Java EE", "J2EE", "Spring", "SpringBoot", "SpringMVC", "MyBatis"]
      weight: 18
      required: true
      description: "扎实的Java基础，精通Java EE"

    - name: "数据库能力"
      keywords: ["MySQL", "Polardb", "oracle", "数据库", "SQL", "索引", "缓存", "消息队列"]
      weight: 15
      required: true
      description: "熟悉Polardb、MySQL等数据库及缓存、消息队列"

    - name: "经验年限"
      keywords: ["5年", "6年", "7年", "8年", "5-10年", "5年以上"]
      weight: 12
      required: true
      description: "相关工作经验5年以上"

  # ===== 加分项 =====
  nice_to_have:
    - name: "泛微OA"
      keywords: ["泛微", "E9", "E10", "OA", "OA系统", "办公自动化", "Workflow", "工作流"]
      weight: 15
      description: "熟悉泛微OA的E9/E10产品，有OA开发经验"

    - name: "K8S云原生"
      keywords: ["K8S", "Kubernetes", "容器", "Docker", "编排", "部署", "云原生"]
      weight: 8
      description: "熟悉K8S部署与管理"

    - name: "Linux/Shell"
      keywords: ["Linux", "Shell", "shell", "运维", "脚本", "bash", "系统运维"]
      weight: 6
      description: "扎实的Linux基础及shell编程技能"

    - name: "项目管理"
      keywords: ["项目管理", "PMP", "项目实施", "方案设计", "技术评审", "需求评审"]
      weight: 6
      description: "具备项目管理经验，独立项目实施能力"

    - name: "云平台"
      keywords: ["阿里云", "腾讯云", "华为云", "云平台", "中间件", "云服务"]
      weight: 5
      description: "具备云平台业务支持经验"

    - name: "大厂经验"
      keywords: ["字节", "腾讯", "阿里", "百度", "美团", "京东", "华为", "大厂"]
      weight: 5
      description: "大厂开发经验"

  # ===== 减分项 =====
  negative:
    - name: "经验不足"
      keywords: ["应届", "实习", "1年", "2年", "3年"]
      weight: -15
      description: "经验不足5年"

    - name: "非Java技术栈"
      keywords: ["PHP", "Python开发", "Go开发", ".NET", "C#"]
      weight: -10
      description: "非Java技术栈"

# 简历文件命名格式
naming:
  format: "{name}_{job_title}_{score}分_{city}_{experience}"

messages:
  request_resume: "您好！您的经历很匹配我们的OA系统开发工程师岗位，方便发一份完整简历给我吗？PDF或Word格式都可以，谢谢！"
  received_thanks: "收到您的简历，我们会尽快评估并回复您，请保持关注，谢谢！"
